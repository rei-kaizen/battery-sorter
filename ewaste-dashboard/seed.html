<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Firebase Seed Tool</title>
  <style>
    body { font-family: system-ui; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; padding: 40px 16px; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 32px; width: 100%; max-width: 480px; }
    h2 { margin: 0 0 6px; font-size: 1.25rem; }
    p  { margin: 0 0 24px; font-size: 0.85rem; color: #64748b; }
    label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 5px; }
    input { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #f8fafc; font-size: 0.95rem; box-sizing: border-box; margin-bottom: 14px; }
    input:focus { outline: none; border-color: #38bdf8; }
    .btn-google { width: 100%; padding: 11px; background: #fff; color: #1f2937; border: none; border-radius: 9px; font-size: 0.95rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; }
    .btn-google:hover { background: #f1f5f9; }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-seed { width: 100%; padding: 11px; background: #38bdf8; color: #0f172a; border: none; border-radius: 9px; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
    .btn-seed:disabled { opacity: 0.5; cursor: not-allowed; }
    .user-row { display: flex; align-items: center; gap: 10px; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); border-radius: 9px; padding: 10px 14px; margin-bottom: 16px; font-size: 0.85rem; color: #10b981; }
    #log { margin-top: 20px; background: #0f172a; border-radius: 8px; padding: 14px; font-size: 0.8rem; font-family: monospace; color: #94a3b8; min-height: 60px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
    .ok  { color: #10b981; }
    .err { color: #ef4444; }
    .inf { color: #38bdf8; }
    #seed-section { display: none; }
  </style>
</head>
<body>
<div class="card">
  <h2>🌱 Firebase Seed Tool</h2>
  <p>Signs in with your Google account — no password needed.</p>

  <!-- Step 1: Sign in -->
  <div id="auth-section">
    <button class="btn-google" id="btn-google" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>
  </div>

  <!-- Step 2: Seed -->
  <div id="seed-section">
    <div class="user-row" id="user-row">✓ Signed in</div>

    <label>Number of events to generate</label>
    <input id="count" type="number" value="40" min="1" max="200" />

    <button class="btn-seed" id="btn-seed" onclick="seed()">Seed Firebase</button>
  </div>

  <div id="log">Ready — sign in with Google to begin.</div>
</div>

<script type="module">
import { initializeApp }                        from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js'
import { getDatabase, ref, push }               from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-database.js'
import { getAuth, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js'

const firebaseConfig = {
  apiKey:            'AIzaSyCTpypQQmGy43uiavAd6FrUcph-Ro6tvsw',
  authDomain:        'embedded-final-project-29234.firebaseapp.com',
  databaseURL:       'https://embedded-final-project-29234-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId:         'embedded-final-project-29234',
  storageBucket:     'embedded-final-project-29234.firebasestorage.app',
  messagingSenderId: '859318591733',
  appId:             '1:859318591733:web:13d1ec2b45b054346da5bc'
}

const app      = initializeApp(firebaseConfig)
const auth     = getAuth(app)
const db       = getDatabase(app)
const provider = new GoogleAuthProvider()

const TEMPLATES = [
  { type: 'Alkaline', baseVoltage: 1.45, magnetic: false },
  { type: 'NiMH',    baseVoltage: 1.25, magnetic: true  },
  { type: 'Li-ion',  baseVoltage: 3.70, magnetic: false }
]

const jitter = (base, range) =>
  parseFloat((base + (Math.random() - 0.5) * range).toFixed(2))

function generateEvents(count) {
  const now    = Date.now()
  const weekMs = 7 * 24 * 60 * 60 * 1000
  return Array.from({ length: count }, (_, i) => ({
    type:      TEMPLATES[i % 3].type,
    voltage:   jitter(TEMPLATES[i % 3].baseVoltage, 0.08),
    magnetic:  TEMPLATES[i % 3].magnetic,
    timestamp: now - Math.floor(Math.random() * weekMs)
  })).sort((a, b) => a.timestamp - b.timestamp)
}

const log = (msg, cls = '') => {
  const el = document.getElementById('log')
  el.innerHTML += `<span class="${cls}">${msg}\n</span>`
  el.scrollTop = el.scrollHeight
}

window.signInGoogle = async () => {
  const btn = document.getElementById('btn-google')
  btn.disabled = true
  log('Opening Google sign-in…', 'inf')
  try {
    const result = await signInWithPopup(auth, provider)
    document.getElementById('user-row').textContent = `✓ Signed in as ${result.user.email}`
    document.getElementById('auth-section').style.display = 'none'
    document.getElementById('seed-section').style.display = 'block'
    log(`Signed in as ${result.user.email}`, 'ok')
  } catch (e) {
    log(`Sign-in failed: ${e.code} — ${e.message}`, 'err')
    btn.disabled = false
  }
}

window.seed = async () => {
  const count = parseInt(document.getElementById('count').value, 10)
  const btn   = document.getElementById('btn-seed')
  btn.disabled = true

  const events = generateEvents(count)
  log(`\nPushing ${events.length} events to Firebase…`, 'inf')

  let ok = 0
  for (const event of events) {
    try {
      await push(ref(db, 'battery_events'), event)
      ok++
      log(`[${ok}/${events.length}] ${event.type} — ${event.voltage}V — ${new Date(event.timestamp).toLocaleDateString()}`, 'ok')
    } catch (e) {
      log(`✗ ${e.code}: ${e.message}`, 'err')
    }
  }

  log(`\nDone — ${ok}/${events.length} events written.`, 'ok')
  btn.disabled = false
}
</script>
</body>
</html>
